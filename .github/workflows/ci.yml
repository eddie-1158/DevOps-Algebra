name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/devops-algebra

jobs:
  build-and-test:
    name: Provjera koda (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, api, worker]
    steps:
      - name: Dohvat koda
        uses: actions/checkout@v4

      - name: Postavljanje Node.js okruženja
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Instalacija ovisnosti
        working-directory: ${{ matrix.service }}
        run: npm ci

  build-scan-push:
    name: Izgradnja, skeniranje i objava (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, api, worker]
    steps:
      - name: Dohvat koda
        uses: actions/checkout@v4

      - name: Postavljanje Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prijava u GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Izgradnja slike (lokalno)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Containerfile
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:scan-target
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy skeniranje ranjivosti
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:scan-target
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Objava Trivy izvještaja u GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Određivanje oznaka slike
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Objava slike u registar
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  release:
    name: Objava SemVer verzije
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        service: [frontend, api, worker]
    steps:
      - name: Dohvat koda
        uses: actions/checkout@v4

      - name: Prijava u GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Izgradnja i objava s latest oznakom
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
