apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ticketing-role
  namespace: ticketing
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ticketing-rolebinding
  namespace: ticketing
subjects:
  - kind: ServiceAccount
    name: ticketing-sa
    namespace: ticketing
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ticketing-role
