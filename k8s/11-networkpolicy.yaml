# Dopušta samo nužnu komunikaciju između servisa (načelo najmanje privilegije)

# Frontend smije primati promet samo s Ingressa
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: ticketing
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - port: 8080
    # DNS rezolucija (kube-dns u kube-system namespaceu)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# API smije primati promet od Ingressa i frontenda
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-policy
  namespace: ticketing
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # DNS rezolucija (kube-dns u kube-system namespaceu)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Worker smije komunicirati samo s bazom i Redisom
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-policy
  namespace: ticketing
spec:
  podSelector:
    matchLabels:
      app: worker
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # DNS rezolucija (kube-dns u kube-system namespaceu)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# PostgreSQL prima promet samo od API-ja i workera
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-policy
  namespace: ticketing
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - port: 5432
    - from:
        - podSelector:
            matchLabels:
              app: worker
      ports:
        - port: 5432
  egress: []
---
# Redis prima promet samo od API-ja i workera
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-policy
  namespace: ticketing
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - port: 6379
    - from:
        - podSelector:
            matchLabels:
              app: worker
      ports:
        - port: 6379
  egress: []
