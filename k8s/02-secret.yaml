# UPOZORENJE: Zamijeniti placeholder vrijednosti prije deploya u produkciju!
# Preporučeni način: kubectl create secret generic app-secrets \
#   --namespace ticketing \
#   --from-literal=POSTGRES_USER=<korisnik> \
#   --from-literal=POSTGRES_PASSWORD=<lozinka>
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ticketing
type: Opaque
stringData:
  POSTGRES_USER: ticketing_user
  POSTGRES_PASSWORD: ZAMIJENI-OVU-LOZINKU-PRIJE-DEPLOYA
